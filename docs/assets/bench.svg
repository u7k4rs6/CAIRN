<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 492" width="1200" height="492" role="img" aria-label="Benchmark medians per operation, log scale, each annotated with its claimed complexity bound">
  <title>Benchmarks</title>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5F7A4E"/>
      <stop offset="100%" stop-color="#9BB380"/>
    </linearGradient>
  </defs>
  <style>
    .mono { font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, "DejaVu Sans Mono", monospace; }
    .title { font-size: 13px; letter-spacing: 3px; fill: #7C8894; }
    .op { font-size: 13px; fill: #A9B4BD; }
    .val { font-size: 13px; fill: #E4E9E6; }
    .bound { font-size: 11.5px; fill: #B76B45; }
    .foot { font-size: 12px; fill: #7C8894; }
    .bar { animation: grow .9s cubic-bezier(.2,.75,.3,1) backwards; transform-origin: 300px 0; }
    .b0 { animation-delay: 0.00s }
    .b1 { animation-delay: 0.06s }
    .b2 { animation-delay: 0.12s }
    .b3 { animation-delay: 0.18s }
    .b4 { animation-delay: 0.24s }
    .b5 { animation-delay: 0.30s }
    .b6 { animation-delay: 0.36s }
    .b7 { animation-delay: 0.42s }
    @keyframes grow { from { transform: scaleX(0) } to { transform: scaleX(1) } }
    @media (prefers-reduced-motion: reduce) { .bar { animation: none } }
  </style>
  <rect width="1200" height="492" rx="14" fill="#12161B"/>
  <rect x=".5" y=".5" width="1199" height="491" rx="14" fill="none" stroke="#2A323B"/>
  <text class="mono title" x="48" y="42">MEDIAN PER OPERATION &#183; LOG SCALE</text>
  <text class="mono bound" x="1152" y="42" text-anchor="end">CLAIMED BOUND</text>
  <line x1="48" y1="64" x2="1152" y2="64" stroke="#2A323B"/>
  <text class="mono op" x="48" y="115">object write (1 KiB blob)</text>
  <rect x="300" y="102" width="690" height="18" rx="3" fill="#171E22"/>
  <rect class="bar b0" x="300" y="102" width="248.9" height="18" rx="3" fill="url(#g)"/>
  <text class="mono val" x="560.9" y="115">41 µs</text>
  <text class="mono bound" x="1152" y="115" text-anchor="end">O(n) in content size</text>
  <text class="mono op" x="48" y="155">object read (warm)</text>
  <rect x="300" y="142" width="690" height="18" rx="3" fill="#171E22"/>
  <rect class="bar b1" x="300" y="142" width="179.5" height="18" rx="3" fill="url(#g)"/>
  <text class="mono val" x="491.5" y="155">12 µs</text>
  <text class="mono bound" x="1152" y="155" text-anchor="end">O(n) in content size</text>
  <text class="mono op" x="48" y="195">ref resolve</text>
  <rect x="300" y="182" width="690" height="18" rx="3" fill="#171E22"/>
  <rect class="bar b2" x="300" y="182" width="26.5" height="18" rx="3" fill="url(#g)"/>
  <text class="mono val" x="338.5" y="195">800 ns</text>
  <text class="mono bound" x="1152" y="195" text-anchor="end">O(1)</text>
  <text class="mono op" x="48" y="235">merge-base (10k-commit DAG)</text>
  <rect x="300" y="222" width="690" height="18" rx="3" fill="#171E22"/>
  <rect class="bar b3" x="300" y="222" width="363.1" height="18" rx="3" fill="url(#g)"/>
  <text class="mono val" x="675.1" y="235">310 µs</text>
  <text class="mono bound" x="1152" y="235" text-anchor="end">O(V+E), gen-number pruned</text>
  <text class="mono op" x="48" y="275">diff, 1k lines (Myers)</text>
  <rect x="300" y="262" width="690" height="18" rx="3" fill="#171E22"/>
  <rect class="bar b4" x="300" y="262" width="465.5" height="18" rx="3" fill="url(#g)"/>
  <text class="mono val" x="777.5" y="275">1.9 ms</text>
  <text class="mono bound" x="1152" y="275" text-anchor="end">O(ND)</text>
  <text class="mono op" x="48" y="315">three-way merge</text>
  <rect x="300" y="302" width="690" height="18" rx="3" fill="#171E22"/>
  <rect class="bar b5" x="300" y="302" width="478.7" height="18" rx="3" fill="url(#g)"/>
  <text class="mono val" x="790.7" y="315">2.4 ms</text>
  <text class="mono bound" x="1152" y="315" text-anchor="end">O(ND) per file</text>
  <text class="mono op" x="48" y="355">packfile encode (1k objects)</text>
  <rect x="300" y="342" width="690" height="18" rx="3" fill="#171E22"/>
  <rect class="bar b6" x="300" y="342" width="682.1" height="18" rx="3" fill="url(#g)"/>
  <text class="mono" x="972.1" y="355" text-anchor="end" font-size="13" fill="#12161B">88 ms</text>
  <text class="mono bound" x="1152" y="355" text-anchor="end">O(n log n) window sort</text>
  <text class="mono op" x="48" y="395">trigram query</text>
  <rect x="300" y="382" width="690" height="18" rx="3" fill="#171E22"/>
  <rect class="bar b7" x="300" y="382" width="348.7" height="18" rx="3" fill="url(#g)"/>
  <text class="mono val" x="660.7" y="395">240 µs</text>
  <text class="mono bound" x="1152" y="395" text-anchor="end">O(posting list)</text>
  <line x1="48" y1="436" x2="1152" y2="436" stroke="#2A323B"/>
  <text class="mono foot" x="48" y="466">Every bound on the right is cited to the method that implements it in docs/COMPLEXITY.md, and checked against the code, not assumed.</text>
</svg>
