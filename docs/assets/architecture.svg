<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 470" width="1200" height="470" role="img" aria-label="Architecture: web depends on cairn-api, which depends on cairn-transfer, which depends on cairn-vcs. Dependencies point inward only.">
  <title>Cairn module architecture</title>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7C8894"/>
    </marker>
  </defs>
  <style>
    .mono { font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, "DejaVu Sans Mono", monospace; }
    .h { font-size: 17px; font-weight: 700; letter-spacing: .4px; fill: #E4E9E6; }
    .h.core { fill: #B3C79A; }
    .sub { font-size: 11px; letter-spacing: 1.6px; fill: #7C8894; }
    .item { font-size: 12.5px; fill: #A9B4BD; }
    .note { font-size: 12px; fill: #7C8894; }
    .badge { font-size: 11px; letter-spacing: .8px; fill: #9BB380; }
    .title { font-size: 13px; letter-spacing: 3px; fill: #7C8894; }
    .dep { font-size: 12px; letter-spacing: 1px; fill: #B76B45; }

    .flow { animation: run 2.6s cubic-bezier(.55,0,.45,1) infinite; }
    .f2 { animation-delay: .28s } .f3 { animation-delay: .56s }
    @keyframes run {
      0%   { transform: translateX(0);   opacity: 0 }
      18%  { opacity: 1 }
      82%  { opacity: 1 }
      100% { transform: translateX(-60px); opacity: 0 }
    }
    .pulse { animation: glow 2.6s ease-in-out infinite; }
    @keyframes glow { 0%,100% { stroke-opacity: .45 } 50% { stroke-opacity: 1 } }
    @media (prefers-reduced-motion: reduce) { .flow, .pulse { animation: none } .flow { opacity: 1 } }
  </style>

  <rect width="1200" height="470" rx="14" fill="#12161B"/>
  <rect x=".5" y=".5" width="1199" height="469" rx="14" fill="none" stroke="#2A323B"/>

  <text class="mono title" x="48" y="44">MODULE GRAPH</text>
  <text class="mono dep" x="1152" y="44" text-anchor="end">DEPENDENCIES POINT INWARD ONLY</text>

  <!-- cairn-vcs: the core -->
  <rect class="pulse" x="48" y="72" width="300" height="352" rx="10" fill="#171E22" stroke="#9BB380"/>
  <text class="mono h core" x="72" y="106">cairn-vcs</text>
  <text class="mono sub" x="72" y="126">THE ENGINE</text>
  <g class="mono item">
    <text x="72" y="160">object store (content-addressed)</text>
    <text x="72" y="184">commit DAG + generation numbers</text>
    <text x="72" y="208">Myers diff</text>
    <text x="72" y="232">three-way merge</text>
    <text x="72" y="256">packfiles, delta encoding</text>
    <text x="72" y="280">trigram search index</text>
    <text x="72" y="304">blame</text>
  </g>
  <line x1="72" y1="330" x2="324" y2="330" stroke="#2A323B"/>
  <text class="mono badge" x="72" y="356">no database. no web framework.</text>
  <text class="mono badge" x="72" y="376">compiles and tests on its own.</text>
  <text class="mono note" x="72" y="402">Judge it the way you would judge</text>
  <text class="mono note" x="72" y="418">any systems library.</text>

  <!-- cairn-transfer -->
  <rect x="420" y="140" width="230" height="216" rx="10" fill="#171E22" stroke="#2F3841"/>
  <text class="mono h" x="444" y="174">cairn-transfer</text>
  <text class="mono sub" x="444" y="194">WIRE PROTOCOL</text>
  <g class="mono item">
    <text x="444" y="226">Git smart-HTTP</text>
    <text x="444" y="250">want / have negotiation</text>
  </g>
  <rect x="444" y="268" width="182" height="62" rx="6" fill="#0E1216" stroke="#2A323B"/>
  <text class="mono" x="456" y="292" font-size="11" fill="#9BB380">missing =</text>
  <text class="mono" x="456" y="310" font-size="11" fill="#9BB380">  reachable(wants)</text>
  <text class="mono" x="456" y="326" font-size="11" fill="#9BB380">  \ reachable(haves)</text>

  <!-- cairn-api -->
  <rect x="722" y="140" width="230" height="216" rx="10" fill="#171E22" stroke="#2F3841"/>
  <text class="mono h" x="746" y="174">cairn-api</text>
  <text class="mono sub" x="746" y="194">THE PLATFORM</text>
  <g class="mono item">
    <text x="746" y="226">Spring Boot REST</text>
    <text x="746" y="250">permissions, teams, orgs</text>
    <text x="746" y="274">issues, pull requests</text>
    <text x="746" y="298">reviews, code search</text>
  </g>
  <text class="mono note" x="746" y="330">The engine knows none</text>
  <text class="mono note" x="746" y="346">of this exists.</text>

  <!-- web -->
  <rect x="1024" y="140" width="128" height="216" rx="10" fill="#171E22" stroke="#2F3841"/>
  <text class="mono h" x="1044" y="174">web</text>
  <text class="mono sub" x="1044" y="194">NEXT.JS</text>
  <g class="mono item" font-size="12">
    <text x="1044" y="226">Server</text>
    <text x="1044" y="242">Components</text>
    <text x="1044" y="258">for reads</text>
    <text x="1044" y="290">client islands</text>
    <text x="1044" y="306">for writes</text>
  </g>

  <!-- inward arrows -->
  <g stroke="#7C8894" stroke-width="1.6" marker-end="url(#ah)">
    <line x1="414" y1="248" x2="356" y2="248"/>
    <line x1="716" y1="248" x2="658" y2="248"/>
    <line x1="1018" y1="248" x2="960" y2="248"/>
  </g>
  <g fill="#9BB380">
    <circle class="flow" cx="412" cy="248" r="3.2"/>
    <circle class="flow f2" cx="714" cy="248" r="3.2"/>
    <circle class="flow f3" cx="1016" cy="248" r="3.2"/>
  </g>
</svg>
